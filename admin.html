<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOMESINKOREA — 관리자</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Apple SD Gothic Neo',-apple-system,sans-serif;background:#f1f5f9;min-height:100vh;display:flex;flex-direction:column}
  .header{background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 100%);color:#fff;padding:24px 40px;display:flex;justify-content:space-between;align-items:center}
  .header h1{font-size:1.2rem;font-weight:700}
  .header p{font-size:.8rem;opacity:.75;margin-top:2px}
  .logout-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:.82rem;cursor:pointer;font-weight:600}
  .logout-btn:hover{background:rgba(255,255,255,.25)}
  .container{max-width:860px;margin:32px auto;padding:0 24px;width:100%}
  .card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);padding:28px;margin-bottom:20px}
  .card-title{font-size:1rem;font-weight:700;color:#1f2937;margin-bottom:18px;display:flex;align-items:center;gap:8px}
  .badge{font-size:.7rem;font-weight:600;background:#eff6ff;color:#2563eb;padding:2px 8px;border-radius:20px}
  .badge-pending{background:#fef3c7;color:#92400e}
  .badge-approved{background:#d1fae5;color:#065f46}
  input{width:100%;padding:11px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:.9rem;outline:none;font-family:inherit;transition:border-color .15s;box-sizing:border-box;margin-bottom:12px}
  input:focus{border-color:#2563eb}
  .btn{padding:11px 24px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .15s}
  .btn:hover{opacity:.88}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-success{background:#16a34a}
  .btn-danger{background:#dc2626;padding:6px 14px;font-size:.8rem}
  .btn-approve{background:#16a34a;padding:6px 14px;font-size:.8rem}
  .msg{padding:12px 14px;border-radius:8px;font-size:.84rem;margin-top:12px;display:none}
  .msg.error{background:#fee2e2;color:#991b1b;display:block}
  .msg.success{background:#d1fae5;color:#065f46;display:block}
  .user-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f3f4f6;gap:12px;flex-wrap:wrap}
  .user-row:last-child{border-bottom:none}
  .user-info{flex:1;min-width:0}
  .user-email{font-weight:600;font-size:.9rem;color:#1f2937;word-break:break-all}
  .user-date{font-size:.75rem;color:#9ca3af;margin-top:3px}
  .user-actions{display:flex;gap:8px;flex-shrink:0}
  #login-panel, #admin-panel{display:none}
  #login-panel.visible, #admin-panel.visible{display:block}
  .empty{text-align:center;padding:32px;color:#9ca3af;font-size:.9rem}
  .stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .stat{background:#fff;border-radius:10px;padding:14px 20px;flex:1;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid #2563eb;min-width:120px}
  .stat .val{font-size:1.6rem;font-weight:700;color:#1f2937}
  .stat .lbl{font-size:.76rem;color:#6b7280;margin-top:2px}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>🏠 HOMESINKOREA — 관리자 페이지</h1>
    <p>회원 가입 승인 관리</p>
  </div>
  <button class="logout-btn" id="logoutBtn" style="display:none" onclick="adminLogout()">로그아웃</button>
</div>

<div class="container">
  <!-- Login -->
  <div class="card" id="login-panel">
    <div class="card-title">🔐 관리자 로그인</div>
    <div style="display:flex;background:#f3f4f6;border-radius:8px;padding:4px;margin-bottom:16px">
      <button id="lt-pw" onclick="switchLoginTab('pw')" style="flex:1;padding:7px;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600;background:#fff;color:#2563eb;box-shadow:0 1px 3px rgba(0,0,0,.1)">비밀번호</button>
      <button id="lt-email" onclick="switchLoginTab('email')" style="flex:1;padding:7px;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:500;background:transparent;color:#6b7280">계정 로그인</button>
    </div>
    <div id="lt-pw-form">
      <input type="password" id="admin-pw" placeholder="마스터 관리자 비밀번호" onkeydown="if(event.key==='Enter')adminLogin()">
      <button class="btn" id="login-btn" onclick="adminLogin()">로그인</button>
    </div>
    <div id="lt-email-form" style="display:none">
      <input type="email" id="admin-email" placeholder="이메일">
      <input type="password" id="admin-email-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')adminLoginEmail()">
      <button class="btn" id="login-email-btn" onclick="adminLoginEmail()" style="background:#6366f1">로그인</button>
    </div>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- Admin Panel -->
  <div id="admin-panel">
    <div class="stats">
      <div class="stat"><div class="val" id="stat-total">-</div><div class="lbl">전체 가입자</div></div>
      <div class="stat" style="border-color:#d97706"><div class="val" id="stat-pending">-</div><div class="lbl">승인 대기</div></div>
      <div class="stat" style="border-color:#16a34a"><div class="val" id="stat-approved">-</div><div class="lbl">승인 완료</div></div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn" id="tab-users-btn" onclick="showAdminTab('users')" style="flex:1">👥 회원 관리</button>
      <button class="btn" id="tab-logs-btn" onclick="showAdminTab('logs')" style="flex:1;background:#6b7280">📋 활동 로그</button>
      <button class="btn" id="tab-tabs-btn" onclick="showAdminTab('tabs')" style="flex:1;background:#6b7280">🗂 탭 순서</button>
      <button class="btn" id="tab-rules-btn" onclick="showAdminTab('rules')" style="flex:1;background:#6b7280">📋 초안 규칙</button>
    </div>

    <div id="admin-users-section">

    <div class="card">
      <div class="card-title">
        ⏳ 승인 대기
        <span class="badge badge-pending" id="pending-count">0명</span>
        <button class="btn" style="margin-left:auto;padding:7px 14px;font-size:.8rem" onclick="loadUsers()">🔄 새로고침</button>
      </div>
      <div id="pending-list"><div class="empty">승인 대기 중인 사용자가 없습니다.</div></div>
    </div>

    <div class="card">
      <div class="card-title">
        ✅ 승인 완료
        <span class="badge badge-approved" id="approved-count">0명</span>
      </div>
      <div id="approved-list"><div class="empty">승인된 사용자가 없습니다.</div></div>
    </div>
  </div>

    <!-- Draft Rules Section -->
    <div id="admin-rules-section" style="display:none">
      <div class="card">
        <div class="card-title">📋 초안 생성기 적용 규칙</div>
        <p style="font-size:.82rem;color:#6b7280;margin-bottom:16px">메시지/이메일 유형별로 AI가 초안 생성 시 따르는 규칙을 편집합니다. 저장 즉시 반영됩니다.</p>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button id="rule-tab-msg" onclick="selectRuleTab('message')" style="padding:8px 18px;border:2px solid #2563eb;background:#eff6ff;color:#2563eb;border-radius:8px;font-size:.84rem;font-weight:700;cursor:pointer">💬 메시지</button>
          <button id="rule-tab-email" onclick="selectRuleTab('email')" style="padding:8px 18px;border:2px solid #e5e7eb;background:#fff;color:#6b7280;border-radius:8px;font-size:.84rem;font-weight:600;cursor:pointer">📧 이메일</button>
        </div>
        <textarea id="rule-editor-message" rows="16" style="width:100%;padding:12px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:.84rem;font-family:inherit;line-height:1.75;outline:none;resize:vertical;box-sizing:border-box" onfocus="this.style.borderColor='#2563eb'" onblur="this.style.borderColor='#e5e7eb'"></textarea>
        <textarea id="rule-editor-email" rows="16" style="display:none;width:100%;padding:12px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:.84rem;font-family:inherit;line-height:1.75;outline:none;resize:vertical;box-sizing:border-box" onfocus="this.style.borderColor='#2563eb'" onblur="this.style.borderColor='#e5e7eb'"></textarea>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="btn btn-success" onclick="saveDraftRules()">💾 저장</button>
          <button class="btn" style="background:#6b7280" onclick="resetDraftRules()">↩ 기본값 복원</button>
        </div>
        <div class="msg" id="rules-msg"></div>
      </div>
    </div>

    <!-- Tab Order Section -->
    <div id="admin-tabs-section" style="display:none">
      <div class="card">
        <div class="card-title">🗂 탭 순서 관리</div>
        <p style="font-size:.82rem;color:#6b7280;margin-bottom:16px">드래그해서 탭 순서를 변경하거나 다른 그룹으로 이동할 수 있습니다.</p>
        <div id="tab-order-container" style="display:flex;flex-direction:column;gap:12px"></div>
        <div style="margin-top:20px;display:flex;gap:8px">
          <button class="btn btn-success" onclick="saveTabOrder()">💾 저장</button>
          <button class="btn" style="background:#6b7280" onclick="resetTabOrder()">↩ 기본값 복원</button>
        </div>
        <div class="msg" id="tab-order-msg"></div>
      </div>
    </div>

    <!-- Logs Section -->
    <div id="admin-logs-section" style="display:none">
      <div class="card">
        <div class="card-title">
          📋 활동 로그
          <button class="btn" style="margin-left:auto;padding:7px 14px;font-size:.8rem" onclick="loadLogs()">🔄 새로고침</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
          <select id="log-filter" style="padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:.84rem;outline:none;flex:1" onchange="loadLogs()">
            <option value="">전체 유저</option>
          </select>
        </div>
        <div id="log-list"><div class="empty">로그가 없습니다.</div></div>
      </div>
    </div>
  </div>
</div>

<script>
let adminKey = '';
let currentAdminTab = 'users';

function switchLoginTab(tab) {
  document.getElementById('lt-pw-form').style.display = tab === 'pw' ? 'block' : 'none';
  document.getElementById('lt-email-form').style.display = tab === 'email' ? 'block' : 'none';
  document.getElementById('lt-pw').style.cssText = tab === 'pw' ? 'flex:1;padding:7px;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600;background:#fff;color:#2563eb;box-shadow:0 1px 3px rgba(0,0,0,.1)' : 'flex:1;padding:7px;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:500;background:transparent;color:#6b7280';
  document.getElementById('lt-email').style.cssText = tab === 'email' ? 'flex:1;padding:7px;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600;background:#fff;color:#6366f1;box-shadow:0 1px 3px rgba(0,0,0,.1)' : 'flex:1;padding:7px;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:500;background:transparent;color:#6b7280';
  document.getElementById('login-msg').className = 'msg';
}

async function adminLoginEmail() {
  const email = document.getElementById('admin-email').value.trim();
  const pw = document.getElementById('admin-email-pw').value;
  if (!email || !pw) { showMsg('login-msg', 'error', '이메일과 비밀번호를 입력해주세요.'); return; }
  const btn = document.getElementById('login-email-btn');
  btn.disabled = true; btn.textContent = '확인 중...';
  const res = await fetch('/api/admin?action=login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password: pw })
  });
  const data = await res.json();
  btn.disabled = false; btn.textContent = '로그인';
  if (!res.ok) { showMsg('login-msg', 'error', data.error || '로그인 실패'); return; }
  adminKey = `bearer:${data.token}`;
  sessionStorage.setItem('admin_key', adminKey);
  await enterAdminPanel();
}

async function setRole(email, isAdmin) {
  const res = await fetch('/api/admin?action=set-role', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
    body: JSON.stringify({ email, isAdmin })
  });
  if (res.ok) loadUsers();
}

function showAdminTab(tab) {
  currentAdminTab = tab;
  document.getElementById('admin-users-section').style.display = tab === 'users' ? 'block' : 'none';
  document.getElementById('admin-logs-section').style.display = tab === 'logs' ? 'block' : 'none';
  document.getElementById('admin-tabs-section').style.display = tab === 'tabs' ? 'block' : 'none';
  document.getElementById('admin-rules-section').style.display = tab === 'rules' ? 'block' : 'none';
  document.getElementById('tab-users-btn').style.background = tab === 'users' ? '#2563eb' : '#6b7280';
  document.getElementById('tab-logs-btn').style.background = tab === 'logs' ? '#6366f1' : '#6b7280';
  document.getElementById('tab-tabs-btn').style.background = tab === 'tabs' ? '#0891b2' : '#6b7280';
  document.getElementById('tab-rules-btn').style.background = tab === 'rules' ? '#16a34a' : '#6b7280';
  if (tab === 'logs') loadLogs();
  if (tab === 'tabs') loadTabOrder();
  if (tab === 'rules') loadDraftRulesAdmin();
}

let currentRuleTab = 'message';
let draftRulesAdminCache = null;

const DRAFT_RULE_DEFAULTS = {
  message: `톤앤매너\n• 친근하지만 전문적 어조 · '고객님' 호칭 필수\n• 한국어: ~합니다/드립니다체 (해요체 금지)\n• 공감 표현으로 시작 · 구체적 다음 단계로 마무리\n• 영어: "Hi there" 또는 고객명 사용 · 따뜻하고 대화적 어조\n\n금지 표현\n• "어쩔 수 없습니다" / "There's nothing we can do"\n• "저희 정책상" (이유 없이 단독 사용)\n• "기다려 주세요" (시간 명시 없이)\n• 고객 탓으로 돌리는 표현 일체\n\n환불/취소\n• 처리 기간 영업일 기준 명시 필수\n• 불가 케이스는 계약서 조항 근거 제시\n\n비자/서류\n• 입주 확정 후 1-2 영업일 내 제공\n• 비자 전 상담 가능 · 예약은 확정 후 권장\n\n서울 외 지역\n• "현재 서울 지역만 운영합니다"로 안내 후 종료`,
  email: `형식\n• 이메일 형식 준수: 인사말 → 본문 → 마무리\n• 한국어/영어 모두 제목 제안 포함 ([제목: ...] / [Subject: ...])\n• 메시지보다 격식체 · 문단 구분 명확히\n\n톤앤매너\n• 친근하지만 전문적 어조 · '고객님' 호칭 필수\n• 한국어: ~합니다/드립니다체 (해요체 금지)\n• 공감 표현으로 시작 · 구체적 다음 단계로 마무리\n\n금지 표현\n• "어쩔 수 없습니다" / "There's nothing we can do"\n• "저희 정책상" (이유 없이 단독 사용)\n• "기다려 주세요" (시간 명시 없이)\n• 고객 탓으로 돌리는 표현 일체\n\n환불/취소\n• 처리 기간 영업일 기준 명시 필수\n• 불가 케이스는 계약서 조항 근거 제시\n\n비자/서류\n• 입주 확정 후 1-2 영업일 내 제공\n• 비자 전 상담 가능 · 예약은 확정 후 권장`
};

function selectRuleTab(type) {
  currentRuleTab = type;
  const isEmail = type === 'email';
  document.getElementById('rule-tab-msg').style.cssText = `padding:8px 18px;border:2px solid ${!isEmail?'#2563eb':'#e5e7eb'};background:${!isEmail?'#eff6ff':'#fff'};color:${!isEmail?'#2563eb':'#6b7280'};border-radius:8px;font-size:.84rem;font-weight:${!isEmail?'700':'600'};cursor:pointer`;
  document.getElementById('rule-tab-email').style.cssText = `padding:8px 18px;border:2px solid ${isEmail?'#2563eb':'#e5e7eb'};background:${isEmail?'#eff6ff':'#fff'};color:${isEmail?'#2563eb':'#6b7280'};border-radius:8px;font-size:.84rem;font-weight:${isEmail?'700':'600'};cursor:pointer`;
  document.getElementById('rule-editor-message').style.display = isEmail ? 'none' : 'block';
  document.getElementById('rule-editor-email').style.display = isEmail ? 'block' : 'none';
}

async function loadDraftRulesAdmin() {
  if (draftRulesAdminCache) return;
  const res = await fetch('/api/admin?action=get-draft-rules');
  const { rules } = await res.json();
  draftRulesAdminCache = rules;
  document.getElementById('rule-editor-message').value = rules.message || DRAFT_RULE_DEFAULTS.message;
  document.getElementById('rule-editor-email').value = rules.email || DRAFT_RULE_DEFAULTS.email;
}

async function saveDraftRules() {
  const rules = {
    message: document.getElementById('rule-editor-message').value,
    email: document.getElementById('rule-editor-email').value
  };
  const res = await fetch('/api/admin?action=save-draft-rules', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
    body: JSON.stringify({ rules })
  });
  draftRulesAdminCache = rules;
  showMsg('rules-msg', res.ok ? 'success' : 'error', res.ok ? '저장되었습니다. 초안 생성기에 즉시 반영됩니다.' : '저장 실패');
}

function resetDraftRules() {
  document.getElementById('rule-editor-message').value = DRAFT_RULE_DEFAULTS.message;
  document.getElementById('rule-editor-email').value = DRAFT_RULE_DEFAULTS.email;
  draftRulesAdminCache = null;
}

const TAB_DEFAULTS = {
  '분석': [
    { id: 'faq', label: 'FAQ 목록' },
    { id: 'analysis', label: '데이터 분석' },
    { id: 'website-faq', label: '웹사이트 FAQ (EN)' },
    { id: 'feedback', label: '개선 피드백' },
    { id: 'notion', label: 'Notion 내보내기' }
  ],
  '상담 AI': [
    { id: 'sim', label: '🌶️ 상담 체험' },
    { id: 'draft', label: '✍️ 초안 생성기' },
    { id: 'translate', label: '🌐 번역기' }
  ],
  '관리': [
    { id: 'meetings', label: '📝 회의록' },
    { id: 'broadcast', label: '📢 공지' },
    { id: 'cleaning', label: '🧹 청소 일정' },
    { id: 'deposit', label: '🔐 보증금' },
    { id: 'sales', label: '📊 세일즈 현황' },
    { id: 'upsell', label: '🛍 업셀링' }
  ]
};

let tabOrderState = null;
let dragSrc = null;

async function loadTabOrder() {
  const res = await fetch('/api/admin?action=get-tab-order');
  const { order } = await res.json();
  const allTabsById = {};
  for (const tabs of Object.values(TAB_DEFAULTS)) tabs.forEach(t => { allTabsById[t.id] = t; });
  if (order) {
    tabOrderState = {};
    for (const [group, defaults] of Object.entries(TAB_DEFAULTS)) {
      const saved = order[group] || [];
      const savedItems = saved.map(id => allTabsById[id]).filter(Boolean);
      const newItems = defaults.filter(d => !saved.includes(d.id));
      tabOrderState[group] = [...savedItems, ...newItems];
    }
  } else {
    tabOrderState = JSON.parse(JSON.stringify(TAB_DEFAULTS));
  }
  renderTabOrder();
}

function renderTabOrder() {
  const container = document.getElementById('tab-order-container');
  container.innerHTML = '';
  for (const [group, tabs] of Object.entries(tabOrderState)) {
    const groupEl = document.createElement('div');
    groupEl.style.cssText = 'border:1px solid #e5e7eb;border-radius:10px;overflow:hidden';
    groupEl.innerHTML = `<div style="background:#f8fafc;padding:10px 14px;font-size:.82rem;font-weight:700;color:#374151;border-bottom:1px solid #e5e7eb">${group}</div>`;
    const list = document.createElement('div');
    list.dataset.group = group;
    list.style.cssText = 'padding:8px;display:flex;flex-direction:column;gap:6px;min-height:52px';
    list.addEventListener('dragover', e => e.preventDefault());
    list.addEventListener('drop', e => handleDrop(e, group, list));
    tabs.forEach(tab => list.appendChild(createTabItem(tab, group)));
    groupEl.appendChild(list);
    container.appendChild(groupEl);
  }
}

function createTabItem(tab, group) {
  const item = document.createElement('div');
  item.draggable = true;
  item.dataset.id = tab.id;
  item.dataset.group = group;
  item.style.cssText = 'display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;cursor:grab;user-select:none;font-size:.88rem;color:#1f2937;transition:box-shadow .1s';
  item.innerHTML = `<span style="color:#9ca3af;font-size:1.1rem;line-height:1">⠿</span><span style="flex:1">${tab.label}</span>`;
  item.addEventListener('dragstart', e => {
    dragSrc = item;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => { item.style.opacity = '0.4'; item.style.boxShadow = '0 4px 12px rgba(0,0,0,.15)'; }, 0);
  });
  item.addEventListener('dragend', () => { item.style.opacity = '1'; item.style.boxShadow = ''; dragSrc = null; });
  item.addEventListener('dragover', e => {
    e.preventDefault();
    if (!dragSrc || dragSrc === item) return;
    const rect = item.getBoundingClientRect();
    const after = e.clientY > rect.top + rect.height / 2;
    item.parentNode.insertBefore(dragSrc, after ? item.nextSibling : item);
  });
  return item;
}

function handleDrop(e, group, list) {
  e.preventDefault();
  if (!dragSrc) return;
  if (!list.contains(dragSrc)) {
    list.appendChild(dragSrc);
    dragSrc.dataset.group = group;
  }
}

function syncTabOrderState() {
  const allTabsById = {};
  for (const tabs of Object.values(TAB_DEFAULTS)) tabs.forEach(t => { allTabsById[t.id] = t; });
  const newState = {};
  document.querySelectorAll('#tab-order-container [data-group]').forEach(list => {
    if (!list.dataset.group) return;
    const g = list.dataset.group;
    if (!newState[g]) newState[g] = [];
    list.querySelectorAll('[data-id]').forEach(item => {
      const tab = allTabsById[item.dataset.id];
      if (tab) newState[g].push(tab);
    });
  });
  tabOrderState = newState;
}

async function saveTabOrder() {
  syncTabOrderState();
  const order = {};
  for (const [group, tabs] of Object.entries(tabOrderState)) order[group] = tabs.map(t => t.id);
  const res = await fetch('/api/admin?action=save-tab-order', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
    body: JSON.stringify({ order })
  });
  showMsg('tab-order-msg', res.ok ? 'success' : 'error', res.ok ? '저장되었습니다. CX 대시보드에 바로 반영됩니다.' : '저장 실패');
}

function resetTabOrder() {
  tabOrderState = JSON.parse(JSON.stringify(TAB_DEFAULTS));
  renderTabOrder();
}

async function loadLogs() {
  const email = document.getElementById('log-filter').value;
  const url = email ? `/api/admin?action=logs&email=${encodeURIComponent(email)}` : '/api/admin?action=logs';
  const res = await fetch(url, { headers: { 'X-Admin-Key': adminKey } });
  if (!res.ok) return;
  const { logs } = await res.json();
  const list = document.getElementById('log-list');
  if (!logs.length) { list.innerHTML = '<div class="empty">로그가 없습니다.</div>'; return; }
  list.innerHTML = logs.map(l => {
    const time = new Date(l.ts).toLocaleString('ko-KR');
    const actionColor = { '로그인':'#2563eb','로그아웃':'#6b7280','탭 전환':'#0891b2','초안 생성':'#16a34a','공지 메시지 생성':'#d97706','공지 발송':'#dc2626' }[l.action] || '#374151';
    return `<div class="user-row">
      <div class="user-info">
        <div class="user-email" style="font-size:.82rem">${l.email}</div>
        <div class="user-date">${time}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <span style="display:inline-block;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:700;color:#fff;background:${actionColor}">${l.action}</span>
        ${l.detail ? `<div style="font-size:.74rem;color:#9ca3af;margin-top:3px">${l.detail}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function showMsg(id, type, text) {
  const el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.textContent = text;
}

async function enterAdminPanel() {
  const res = await fetch('/api/admin?action=users', { headers: { 'X-Admin-Key': adminKey } });
  if (!res.ok) { showMsg('login-msg', 'error', '인증 실패'); return; }
  document.getElementById('login-panel').classList.remove('visible');
  document.getElementById('admin-panel').classList.add('visible');
  document.getElementById('logoutBtn').style.display = 'block';
  renderUsers((await res.json()).users);
}

async function adminLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (!pw) return;
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = '확인 중...';
  const res = await fetch('/api/admin?action=users', { headers: { 'X-Admin-Key': pw } });
  btn.disabled = false; btn.textContent = '로그인';
  if (!res.ok) { showMsg('login-msg', 'error', '비밀번호가 올바르지 않습니다.'); return; }
  adminKey = pw;
  sessionStorage.setItem('admin_key', pw);
  document.getElementById('login-panel').classList.remove('visible');
  document.getElementById('admin-panel').classList.add('visible');
  document.getElementById('logoutBtn').style.display = 'block';
  renderUsers((await res.json()).users);
}

function adminLogout() {
  adminKey = '';
  sessionStorage.removeItem('admin_key');
  document.getElementById('login-panel').classList.add('visible');
  document.getElementById('admin-panel').classList.remove('visible');
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('admin-pw').value = '';
}

async function loadUsers() {
  const res = await fetch('/api/admin?action=users', { headers: { 'X-Admin-Key': adminKey } });
  if (!res.ok) return;
  renderUsers((await res.json()).users);
}

function updateLogFilter(users) {
  const sel = document.getElementById('log-filter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">전체 유저</option>' +
    users.map(u => `<option value="${u.email}" ${u.email===cur?'selected':''}>${u.email}</option>`).join('');
}

function renderUsers(users) {
  updateLogFilter(users);
  const pending = users.filter(u => !u.approved);
  const approved = users.filter(u => u.approved);

  document.getElementById('stat-total').textContent = users.length;
  document.getElementById('stat-pending').textContent = pending.length;
  document.getElementById('stat-approved').textContent = approved.length;
  document.getElementById('pending-count').textContent = pending.length + '명';
  document.getElementById('approved-count').textContent = approved.length + '명';

  document.getElementById('pending-list').innerHTML = pending.length
    ? pending.map(u => userRow(u, false)).join('')
    : '<div class="empty">승인 대기 중인 사용자가 없습니다.</div>';

  document.getElementById('approved-list').innerHTML = approved.length
    ? approved.map(u => userRow(u, true)).join('')
    : '<div class="empty">승인된 사용자가 없습니다.</div>';
}

function userRow(u, isApproved) {
  const date = new Date(u.createdAt).toLocaleString('ko-KR');
  const adminBadge = u.isAdmin ? '<span style="background:#6366f1;color:#fff;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px">👑 관리자</span>' : '';
  const roleBtn = isApproved
    ? (u.isAdmin
        ? `<button class="btn" style="background:#6b7280;padding:6px 12px;font-size:.78rem" onclick="setRole('${u.email}', false)">권한 취소</button>`
        : `<button class="btn" style="background:#6366f1;padding:6px 12px;font-size:.78rem" onclick="setRole('${u.email}', true)">👑 관리자 부여</button>`)
    : '';
  const actions = isApproved
    ? `<button class="btn btn-danger" onclick="setApproval('${u.email}', false)">승인 취소</button>${roleBtn}`
    : `<button class="btn btn-approve" onclick="setApproval('${u.email}', true)">✅ 승인</button>
       <button class="btn btn-danger" onclick="setApproval('${u.email}', false)">거절</button>`;
  const safeEmail = u.email.replace(/'/g, "\\'");
  const nicknameDisplay = u.nickname
    ? `<span id="nn-text-${u.email}" style="font-weight:600;color:#4338ca">${u.nickname}</span>`
    : `<span id="nn-text-${u.email}" style="color:#9ca3af;font-style:italic">닉네임 없음</span>`;
  return `<div class="user-row">
    <div class="user-info">
      <div class="user-email">${u.email}${adminBadge}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap">
        <span style="font-size:.75rem;color:#6b7280">닉네임:</span>
        <span id="nn-view-${u.email}" style="display:flex;align-items:center;gap:5px">
          ${nicknameDisplay}
          <button onclick="startEditNickname('${safeEmail}','${(u.nickname||'').replace(/'/g,"\\'")}')" style="background:none;border:none;cursor:pointer;color:#9ca3af;font-size:.8rem;padding:0 2px" title="닉네임 수정">✏️</button>
        </span>
        <span id="nn-edit-${u.email}" style="display:none;align-items:center;gap-4px">
          <input id="nn-input-${u.email}" type="text" maxlength="20" style="padding:3px 8px;border:1px solid #c7d2fe;border-radius:6px;font-size:.82rem;width:110px;font-family:inherit;outline:none">
          <button onclick="saveNickname('${safeEmail}')" style="padding:3px 10px;background:#4338ca;color:#fff;border:none;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;margin-left:4px">저장</button>
          <button onclick="cancelEditNickname('${safeEmail}')" style="padding:3px 8px;background:#f1f5f9;color:#64748b;border:none;border-radius:6px;font-size:.78rem;cursor:pointer;margin-left:2px">취소</button>
        </span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap">
        <span style="font-size:.75rem;color:#6b7280">Slack ID:</span>
        <span id="sl-view-${u.email}" style="display:flex;align-items:center;gap:5px">
          ${u.slackUserId ? `<span style="font-size:.78rem;font-family:monospace;color:#4338ca">${u.slackUserId}</span>` : `<span style="font-size:.78rem;color:#9ca3af;font-style:italic">미등록</span>`}
          <button onclick="startEditSlackId('${safeEmail}','${(u.slackUserId||'').replace(/'/g,"\\'")}')" style="background:none;border:none;cursor:pointer;color:#9ca3af;font-size:.8rem;padding:0 2px">✏️</button>
        </span>
        <span id="sl-edit-${u.email}" style="display:none;align-items:center">
          <input id="sl-input-${u.email}" type="text" placeholder="U01AB2CD3EF" maxlength="20" style="padding:3px 8px;border:1px solid #c7d2fe;border-radius:6px;font-size:.78rem;width:120px;font-family:monospace;outline:none">
          <button onclick="saveSlackId('${safeEmail}')" style="padding:3px 10px;background:#4338ca;color:#fff;border:none;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;margin-left:4px">저장</button>
          <button onclick="cancelEditSlackId('${safeEmail}')" style="padding:3px 8px;background:#f1f5f9;color:#64748b;border:none;border-radius:6px;font-size:.78rem;cursor:pointer;margin-left:2px">취소</button>
        </span>
      </div>
      <div class="user-date">가입일: ${date}</div>
    </div>
    <div class="user-actions">${actions}</div>
  </div>`;
}

function startEditSlackId(email, current) {
  document.getElementById(`sl-view-${email}`).style.display = 'none';
  const editEl = document.getElementById(`sl-edit-${email}`);
  editEl.style.display = 'flex';
  const inp = document.getElementById(`sl-input-${email}`);
  inp.value = current; inp.focus();
  inp.onkeydown = e => { if (e.key === 'Enter') saveSlackId(email); if (e.key === 'Escape') cancelEditSlackId(email); };
}

function cancelEditSlackId(email) {
  document.getElementById(`sl-edit-${email}`).style.display = 'none';
  document.getElementById(`sl-view-${email}`).style.display = 'flex';
}

async function saveSlackId(email) {
  const slackUserId = document.getElementById(`sl-input-${email}`).value.trim();
  const res = await fetch('/api/admin?action=set-slack-id', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
    body: JSON.stringify({ email, slackUserId })
  });
  if (res.ok) loadUsers();
}

function startEditNickname(email, current) {
  document.getElementById(`nn-view-${email}`).style.display = 'none';
  const editEl = document.getElementById(`nn-edit-${email}`);
  editEl.style.display = 'flex';
  const inp = document.getElementById(`nn-input-${email}`);
  inp.value = current;
  inp.focus();
  inp.onkeydown = e => { if (e.key === 'Enter') saveNickname(email); if (e.key === 'Escape') cancelEditNickname(email); };
}

function cancelEditNickname(email) {
  document.getElementById(`nn-edit-${email}`).style.display = 'none';
  document.getElementById(`nn-view-${email}`).style.display = 'flex';
}

async function saveNickname(email) {
  const nickname = document.getElementById(`nn-input-${email}`).value.trim();
  const res = await fetch('/api/admin?action=set-nickname', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
    body: JSON.stringify({ email, nickname })
  });
  if (res.ok) loadUsers();
}

async function setApproval(email, approved) {
  const res = await fetch('/api/admin?action=approve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
    body: JSON.stringify({ email, approved })
  });
  if (res.ok) loadUsers();
}

window.addEventListener('DOMContentLoaded', async () => {
  const saved = sessionStorage.getItem('admin_key');
  if (saved) {
    const res = await fetch('/api/admin?action=users', { headers: { 'X-Admin-Key': saved } });
    if (res.ok) {
      adminKey = saved;
      document.getElementById('admin-panel').classList.add('visible');
      document.getElementById('logoutBtn').style.display = 'block';
      renderUsers((await res.json()).users);
      return;
    }
  }
  document.getElementById('login-panel').classList.add('visible');
});
</script>
