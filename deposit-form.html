<style>

  .q-code:focus{border-color:#fff}
  .q-tel{flex:1}

  .nat-wrap{position:relative;width:100%}
  .nat-dd{position:absolute;top:calc(100% + 8px);left:0;right:0;background:rgba(15,35,100,.97);backdrop-filter:blur(16px);border:2px solid rgba(255,255,255,.35);border-radius:12px;max-height:230px;overflow-y:auto;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.5)}

  .nat-opt:last-child{border-bottom:none}
  .nat-opt:hover,.nat-opt.sel{background:rgba(255,255,255,.18);font-weight:600}
  .nat-empty{padding:16px 18px;color:rgba(255,255,255,.45);font-size:.9rem;text-align:center}
  /* buttons */
  .next-btn{margin-top:20px;display:flex;align-items:center;gap:8px;background:#fff;color:#1e3a8a;border:none;border-radius:12px;padding:14px 28px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:inherit}
  .next-btn:hover{opacity:.9}
  .hint{margin-top:12px;font-size:.8rem;opacity:.55}
  .error-shake{animation:shake .35s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

let fields = [], currentStep = 0, answers = [], natValue = '';

async function init() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="center-msg">Loading...</div>';
  try {
    const res = await fetch('/api/deposit?action=get-form');
    const data = await res.json();
    fields = data.fields || [];
    if (!fields.length) {
      app.innerHTML = '<div class="center-msg question-wrap"><div class="question-text">This form is not ready yet.<br>Please try again later.</div></div>';
      return;
    }
    answers = fields.map(() => '');
    showStep(0);
  } catch(e) {
    app.innerHTML = '<div class="center-msg">An error occurred. Please try again later.</div>';
  }
}

function setProgress(step) {
  document.getElementById('progress').style.width = (fields.length ? step / fields.length * 100 : 0) + '%';
}

function buildNatSearch(currentVal, onChange) {
  let selected = currentVal || '';
  const wrap = document.createElement('div');
  wrap.className = 'nat-wrap';

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'q-input';
  inp.placeholder = 'Type to search nationalityвЂ¦';
  inp.autocomplete = 'off';
  inp.spellcheck = false;
  inp.value = selected;

  const dd = document.createElement('div');
  dd.className = 'nat-dd';
  dd.style.display = 'none';

  function renderList(q) {
    const lower = q.toLowerCase();
    const matches = q.trim() ? NATIONALITIES.filter(n => n.toLowerCase().includes(lower)) : NATIONALITIES;
    if (!matches.length) {
      dd.innerHTML = '<div class="nat-empty">No results found</div>';
    } else {
      dd.innerHTML = matches.map(n =>
        `<div class="nat-opt${n === selected ? ' sel' : ''}">${n}</div>`
      ).join('');
      dd.querySelectorAll('.nat-opt').forEach((opt, i) => {
        opt.addEventListener('mousedown', e => {
          e.preventDefault();
          selected = matches[i];
          inp.value = selected;
          onChange(selected);
          dd.style.display = 'none';
        });
      });
    }
    dd.style.display = 'block';
  }

  inp.addEventListener('focus', () => renderList(inp.value));
  inp.addEventListener('input', () => { selected = ''; onChange(''); renderList(inp.value); });
  inp.addEventListener('blur', () => setTimeout(() => { dd.style.display = 'none'; }, 160));
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); next(); } });

  wrap.appendChild(inp);
  wrap.appendChild(dd);
  return wrap;
}

function buildInput(f, i) {
  if (f.type === 'textarea') {
    return `<textarea class="q-input q-textarea" id="q-input" placeholder="${f.placeholder || ''}" rows="4">${answers[i]}</textarea>`;
  }
  if (f.type === 'tel-intl') {
    const saved = answers[i] || '';
    const spaceIdx = saved.indexOf(' ');
    const savedCode = spaceIdx > 0 ? saved.slice(0, spaceIdx) : '+82';
    const savedNum  = spaceIdx > 0 ? saved.slice(spaceIdx + 1) : '';
    const options = COUNTRY_CODES.map(c =>
      `<option value="${c.code}" ${c.code === savedCode && c.name.includes(savedCode) ? 'selected' : ''}>${c.name}</option>`
    ).join('');
    return `<div class="tel-wrap">
      <select class="q-code" id="q-code">${options}</select>
      <input class="q-input q-tel" id="q-input" type="tel" placeholder="${f.placeholder || 'Phone number'}" value="${savedNum}">
    </div>`;
  }
  return `<input class="q-input" id="q-input" type="${f.type || 'text'}" placeholder="${f.placeholder || ''}" value="${answers[i]}">`;
}

function showStep(i) {
  currentStep = i;
  natValue = answers[i] || '';
  if (i >= fields.length) { showThanks(); return; }
  setProgress(i);
  const f = fields[i];
  const isLast = i === fields.length - 1;
  const isNat = f.type === 'nationality';
  const inputHTML = isNat ? '<div id="nat-container"></div>' : buildInput(f, i);
  const showHint = !isNat && f.type !== 'date';

  document.getElementById('app').innerHTML = `
    <div class="question-wrap">
      <div class="step-label">${i + 1} / ${fields.length}</div>
      <div class="question-text">${f.label}${f.required ? '' : ' <span style="font-size:.9rem;opacity:.6;font-weight:400">(optional)</span>'}</div>
      ${inputHTML}
      <button class="next-btn" onclick="next()" id="next-btn">${isLast ? 'Submit вњ“' : 'Next в†’'}</button>
      ${showHint ? '<div class="hint">Press Enter to continue</div>' : ''}
    </div>`;

  if (isNat) {
    const container = document.getElementById('nat-container');
    const widget = buildNatSearch(natValue, val => { natValue = val; });
    container.replaceWith(widget);
    widget.querySelector('input').focus();
  } else {
    const input = document.getElementById('q-input');
    if (input) {
      if (f.type !== 'date') input.focus();
      if (f.type !== 'textarea' && f.type !== 'tel-intl' && f.type !== 'date') {
        input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); next(); } });
      }
      if (f.type === 'tel-intl') {
        input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); next(); } });
      }
    }
  }
}

function getValue() {
  const f = fields[currentStep];
  if (f.type === 'nationality') return natValue;
  if (f.type === 'tel-intl') {
    const code = document.getElementById('q-code')?.value || '';
    const num  = (document.getElementById('q-input')?.value || '').trim();
    return num ? `${code} ${num}` : '';
  }
  return (document.getElementById('q-input')?.value || '').trim();
}

function next() {
  const f = fields[currentStep];
  const val = getValue();
  if (f.required && !val) {
    const el = f.type === 'nationality'
      ? document.querySelector('.nat-wrap input')
      : document.getElementById('q-input');
    if (el) { el.style.borderColor = '#fca5a5'; el.classList.add('error-shake'); setTimeout(() => { el.style.borderColor = ''; el.classList.remove('error-shake'); }, 500); }
    return;
  }
  answers[currentStep] = val;
  showStep(currentStep + 1);
}

async function showThanks() {
  setProgress(fields.length);
  document.getElementById('app').innerHTML = `
    <div class="thanks">
      <div class="thanks-icon">вњ…</div>
      <h2>All done!</h2>
      <p>Your deposit information has been successfully submitted.<br>Our team will be in touch with you shortly.</p>
    </div>`;
  try {
    const payload = fields.map((f, i) => ({ label: f.label, value: answers[i] }));
    await fetch('/api/deposit?action=submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers: payload })
    });
  } catch(e) {}
}

init();
</script>
