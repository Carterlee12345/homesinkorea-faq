<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOMESINKOREA · 보증금 정보 입력</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Apple SD Gothic Neo',-apple-system,sans-serif;background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 60%,#3b82f6 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:24px}
  .progress-bar{position:fixed;top:0;left:0;height:4px;background:rgba(255,255,255,.3);width:100%;z-index:10}
  .progress-fill{height:100%;background:#fff;transition:width .4s ease}
  .logo{font-size:1rem;font-weight:700;opacity:.8;margin-bottom:48px;letter-spacing:.05em}
  .question-wrap{width:100%;max-width:580px;animation:fadeUp .4s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .step-label{font-size:.8rem;opacity:.6;margin-bottom:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
  .question-text{font-size:1.5rem;font-weight:700;line-height:1.45;margin-bottom:32px}
  .q-input{width:100%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.3);border-radius:12px;padding:16px 20px;font-size:1.1rem;color:#fff;outline:none;font-family:inherit;transition:border-color .2s;backdrop-filter:blur(4px)}
  .q-input::placeholder{color:rgba(255,255,255,.45)}
  .q-input:focus{border-color:#fff}
  .q-input::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer;opacity:.7}
  .q-textarea{resize:none;min-height:120px}
  /* tel-intl */
  .tel-wrap{display:flex;gap:10px;width:100%}
  .q-code{width:160px;flex-shrink:0;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.3);border-radius:12px;padding:16px 14px;font-size:1rem;color:#fff;outline:none;font-family:inherit;transition:border-color .2s;backdrop-filter:blur(4px);cursor:pointer;appearance:none;-webkit-appearance:none}
  .q-code option{color:#1e3a8a;background:#fff;font-size:.95rem}
  .q-code:focus{border-color:#fff}
  .q-tel{flex:1}
  /* buttons */
  .next-btn{margin-top:20px;display:flex;align-items:center;gap:8px;background:#fff;color:#1e3a8a;border:none;border-radius:12px;padding:14px 28px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:inherit}
  .next-btn:hover{opacity:.9}
  .hint{margin-top:12px;font-size:.8rem;opacity:.55}
  .error-shake{animation:shake .35s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  /* thank you */
  .thanks{text-align:center;animation:fadeUp .5s ease}
  .thanks-icon{font-size:4rem;margin-bottom:20px}
  .thanks h2{font-size:1.8rem;font-weight:800;margin-bottom:12px}
  .thanks p{opacity:.8;font-size:1rem;line-height:1.7}
  .center-msg{text-align:center;opacity:.8}
</style>
</head>
<body>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<div class="logo">🏠 HOMESINKOREA</div>
<div id="app"></div>

<script>
const COUNTRY_CODES = [
  {code:'+82',name:'🇰🇷 KR +82'},
  {code:'+1',name:'🇺🇸 US +1'},
  {code:'+1',name:'🇨🇦 CA +1'},
  {code:'+44',name:'🇬🇧 GB +44'},
  {code:'+61',name:'🇦🇺 AU +61'},
  {code:'+64',name:'🇳🇿 NZ +64'},
  {code:'+81',name:'🇯🇵 JP +81'},
  {code:'+86',name:'🇨🇳 CN +86'},
  {code:'+852',name:'🇭🇰 HK +852'},
  {code:'+886',name:'🇹🇼 TW +886'},
  {code:'+65',name:'🇸🇬 SG +65'},
  {code:'+60',name:'🇲🇾 MY +60'},
  {code:'+66',name:'🇹🇭 TH +66'},
  {code:'+84',name:'🇻🇳 VN +84'},
  {code:'+62',name:'🇮🇩 ID +62'},
  {code:'+63',name:'🇵🇭 PH +63'},
  {code:'+91',name:'🇮🇳 IN +91'},
  {code:'+92',name:'🇵🇰 PK +92'},
  {code:'+880',name:'🇧🇩 BD +880'},
  {code:'+971',name:'🇦🇪 AE +971'},
  {code:'+966',name:'🇸🇦 SA +966'},
  {code:'+90',name:'🇹🇷 TR +90'},
  {code:'+7',name:'🇷🇺 RU +7'},
  {code:'+49',name:'🇩🇪 DE +49'},
  {code:'+33',name:'🇫🇷 FR +33'},
  {code:'+34',name:'🇪🇸 ES +34'},
  {code:'+39',name:'🇮🇹 IT +39'},
  {code:'+31',name:'🇳🇱 NL +31'},
  {code:'+32',name:'🇧🇪 BE +32'},
  {code:'+41',name:'🇨🇭 CH +41'},
  {code:'+43',name:'🇦🇹 AT +43'},
  {code:'+46',name:'🇸🇪 SE +46'},
  {code:'+47',name:'🇳🇴 NO +47'},
  {code:'+45',name:'🇩🇰 DK +45'},
  {code:'+358',name:'🇫🇮 FI +358'},
  {code:'+48',name:'🇵🇱 PL +48'},
  {code:'+420',name:'🇨🇿 CZ +420'},
  {code:'+36',name:'🇭🇺 HU +36'},
  {code:'+40',name:'🇷🇴 RO +40'},
  {code:'+380',name:'🇺🇦 UA +380'},
  {code:'+55',name:'🇧🇷 BR +55'},
  {code:'+52',name:'🇲🇽 MX +52'},
  {code:'+54',name:'🇦🇷 AR +54'},
  {code:'+56',name:'🇨🇱 CL +56'},
  {code:'+57',name:'🇨🇴 CO +57'},
  {code:'+27',name:'🇿🇦 ZA +27'},
  {code:'+20',name:'🇪🇬 EG +20'},
  {code:'+234',name:'🇳🇬 NG +234'},
];

let fields = [];
let currentStep = 0;
let answers = [];

async function init() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="center-msg">로딩 중...</div>';
  try {
    const res = await fetch('/api/deposit?action=get-form');
    const data = await res.json();
    fields = data.fields || [];
    if (!fields.length) {
      app.innerHTML = '<div class="center-msg question-wrap"><div class="question-text">현재 폼이 준비 중입니다.<br>잠시 후 다시 시도해 주세요.</div></div>';
      return;
    }
    answers = fields.map(() => '');
    showStep(0);
  } catch(e) {
    app.innerHTML = '<div class="center-msg">오류가 발생했습니다. 잠시 후 다시 시도해 주세요.</div>';
  }
}

function setProgress(step) {
  const pct = fields.length ? (step / fields.length * 100) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function buildInput(f, i) {
  if (f.type === 'textarea') {
    return `<textarea class="q-input q-textarea" id="q-input" placeholder="${f.placeholder || ''}" rows="4">${answers[i]}</textarea>`;
  }
  if (f.type === 'tel-intl') {
    const saved = answers[i] || '';
    const spaceIdx = saved.indexOf(' ');
    const savedCode = spaceIdx > 0 ? saved.slice(0, spaceIdx) : '+82';
    const savedNum  = spaceIdx > 0 ? saved.slice(spaceIdx + 1) : '';
    const options = COUNTRY_CODES.map(c =>
      `<option value="${c.code}" ${c.code === savedCode && c.name.includes(savedCode) ? 'selected' : ''}>${c.name}</option>`
    ).join('');
    return `<div class="tel-wrap">
      <select class="q-code" id="q-code">${options}</select>
      <input class="q-input q-tel" id="q-input" type="tel" placeholder="${f.placeholder || '전화번호'}" value="${savedNum}">
    </div>`;
  }
  return `<input class="q-input" id="q-input" type="${f.type || 'text'}" placeholder="${f.placeholder || ''}" value="${answers[i]}">`;
}

function showStep(i) {
  currentStep = i;
  if (i >= fields.length) { showThanks(); return; }
  setProgress(i);
  const f = fields[i];
  const isLast = i === fields.length - 1;

  document.getElementById('app').innerHTML = `
    <div class="question-wrap">
      <div class="step-label">${i + 1} / ${fields.length}</div>
      <div class="question-text">${f.label}${f.required ? '' : ' <span style="font-size:.9rem;opacity:.6;font-weight:400">(선택)</span>'}</div>
      ${buildInput(f, i)}
      <button class="next-btn" onclick="next()" id="next-btn">${isLast ? '제출하기 ✓' : '다음 →'}</button>
      ${f.type !== 'date' ? '<div class="hint">Enter 키로 다음 단계</div>' : ''}
    </div>`;

  const input = document.getElementById('q-input');
  if (input) {
    if (f.type !== 'date') input.focus();
    if (f.type !== 'textarea' && f.type !== 'tel-intl' && f.type !== 'date') {
      input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); next(); } });
    }
    if (f.type === 'tel-intl') {
      input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); next(); } });
    }
  }
}

function getValue() {
  const f = fields[currentStep];
  if (f.type === 'tel-intl') {
    const code = document.getElementById('q-code')?.value || '';
    const num  = (document.getElementById('q-input')?.value || '').trim();
    return num ? `${code} ${num}` : '';
  }
  return (document.getElementById('q-input')?.value || '').trim();
}

function next() {
  const f = fields[currentStep];
  const val = getValue();
  if (f.required && !val) {
    const el = document.getElementById('q-input');
    if (el) { el.style.borderColor = '#fca5a5'; el.classList.add('error-shake'); setTimeout(() => { el.style.borderColor = ''; el.classList.remove('error-shake'); }, 500); }
    return;
  }
  answers[currentStep] = val;
  showStep(currentStep + 1);
}

async function showThanks() {
  setProgress(fields.length);
  document.getElementById('app').innerHTML = `
    <div class="thanks">
      <div class="thanks-icon">✅</div>
      <h2>제출 완료!</h2>
      <p>보증금 정보가 정상적으로 접수되었습니다.<br>담당자가 확인 후 연락드리겠습니다.</p>
    </div>`;
  try {
    const payload = fields.map((f, i) => ({ label: f.label, value: answers[i] }));
    await fetch('/api/deposit?action=submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers: payload })
    });
  } catch(e) {}
}

init();
</script>
</body>
</html>
