<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOMESINKOREA · Review</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Segoe UI',sans-serif;background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 60%,#3b82f6 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:24px}
  .progress-bar{position:fixed;top:0;left:0;height:4px;background:rgba(255,255,255,.3);width:100%;z-index:10}
  .progress-fill{height:100%;background:#fff;transition:width .4s ease}
  .logo{font-size:1rem;font-weight:700;opacity:.8;margin-bottom:48px;letter-spacing:.05em}
  .question-wrap{width:100%;max-width:580px;animation:fadeUp .4s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .step-label{font-size:.8rem;opacity:.6;margin-bottom:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
  .question-text{font-size:1.5rem;font-weight:700;line-height:1.45;margin-bottom:8px}
  .question-hint{font-size:.88rem;opacity:.6;margin-bottom:28px;line-height:1.5}
  /* star */
  .star-row{display:flex;gap:12px;margin-bottom:8px}
  .star{font-size:2.8rem;cursor:pointer;transition:transform .12s,opacity .12s;opacity:.3;user-select:none;-webkit-user-select:none}
  .star.active{opacity:1}
  .star:hover{transform:scale(1.15)}
  .star-label{font-size:.85rem;opacity:.65;margin-top:6px;min-height:1.2em}
  /* inputs */
  .q-input{width:100%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.3);border-radius:12px;padding:16px 20px;font-size:1.1rem;color:#fff;outline:none;font-family:inherit;transition:border-color .2s;backdrop-filter:blur(4px)}
  .q-input::placeholder{color:rgba(255,255,255,.45)}
  .q-input:focus{border-color:#fff}
  .q-textarea{resize:none;min-height:120px}
  /* nationality searchable dropdown */
  .nat-wrap{position:relative;width:100%}
  .nat-dd{position:absolute;top:calc(100% + 8px);left:0;right:0;background:rgba(15,35,100,.97);backdrop-filter:blur(16px);border:2px solid rgba(255,255,255,.35);border-radius:12px;max-height:230px;overflow-y:auto;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.5)}
  .nat-dd::-webkit-scrollbar{width:4px}
  .nat-dd::-webkit-scrollbar-track{background:transparent}
  .nat-dd::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:2px}
  .nat-opt{padding:12px 18px;cursor:pointer;font-size:1rem;color:#fff;border-bottom:1px solid rgba(255,255,255,.07);transition:background .1s}
  .nat-opt:last-child{border-bottom:none}
  .nat-opt:hover,.nat-opt.sel{background:rgba(255,255,255,.18);font-weight:600}
  .nat-empty{padding:16px 18px;color:rgba(255,255,255,.45);font-size:.9rem;text-align:center}
  /* yesno */
  .yesno-row{display:flex;gap:14px}
  .yn-btn{flex:1;padding:18px;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.3);border-radius:14px;font-size:1.1rem;font-weight:700;color:#fff;cursor:pointer;transition:all .18s;font-family:inherit}
  .yn-btn:hover{background:rgba(255,255,255,.22)}
  .yn-btn.selected{background:rgba(255,255,255,.28);border-color:#fff}
  /* select (dropdown type) */
  .q-select{width:100%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.3);border-radius:12px;padding:16px 20px;font-size:1.05rem;color:#fff;outline:none;font-family:inherit;transition:border-color .2s;backdrop-filter:blur(4px);cursor:pointer;appearance:none;-webkit-appearance:none}
  .q-select option{color:#1e3a8a;background:#fff}
  .q-select:focus{border-color:#fff}
  /* buttons */
  .next-btn{margin-top:20px;display:inline-flex;align-items:center;gap:8px;background:#fff;color:#1e3a8a;border:none;border-radius:12px;padding:14px 28px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:inherit}
  .next-btn:hover{opacity:.9}
  .next-btn:disabled{opacity:.5;cursor:not-allowed}
  .skip-link{display:block;margin-top:12px;font-size:.82rem;opacity:.5;cursor:pointer;background:none;border:none;color:#fff;font-family:inherit;padding:4px 0;text-align:left}
  .skip-link:hover{opacity:.75}
  .hint{margin-top:12px;font-size:.8rem;opacity:.55}
  .error-shake{animation:shake .35s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  /* thanks */
  .thanks{text-align:center;animation:fadeUp .5s ease}
  .thanks-icon{font-size:4rem;margin-bottom:20px}
  .thanks h2{font-size:1.8rem;font-weight:800;margin-bottom:12px}
  .thanks p{opacity:.8;font-size:1rem;line-height:1.7}
  .center-msg{text-align:center;opacity:.7;font-size:.95rem}
</style>
</head>
<body>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<div class="logo">🏠 HOMESINKOREA</div>
<div id="app"><div class="center-msg">Loading…</div></div>

<script>
const NATIONALITIES = [
  'Afghanistan 🇦🇫','Albania 🇦🇱','Algeria 🇩🇿','Andorra 🇦🇩','Angola 🇦🇴',
  'Argentina 🇦🇷','Armenia 🇦🇲','Australia 🇦🇺','Austria 🇦🇹','Azerbaijan 🇦🇿',
  'Bahrain 🇧🇭','Bangladesh 🇧🇩','Belarus 🇧🇾','Belgium 🇧🇪','Bolivia 🇧🇴',
  'Bosnia & Herzegovina 🇧🇦','Brazil 🇧🇷','Bulgaria 🇧🇬','Cambodia 🇰🇭','Canada 🇨🇦',
  'Chile 🇨🇱','China 🇨🇳','Colombia 🇨🇴','Costa Rica 🇨🇷','Croatia 🇭🇷',
  'Cuba 🇨🇺','Czech Republic 🇨🇿','Denmark 🇩🇰','Ecuador 🇪🇨','Egypt 🇪🇬',
  'Estonia 🇪🇪','Ethiopia 🇪🇹','Finland 🇫🇮','France 🇫🇷','Georgia 🇬🇪',
  'Germany 🇩🇪','Ghana 🇬🇭','Greece 🇬🇷','Guatemala 🇬🇹','Hong Kong 🇭🇰',
  'Hungary 🇭🇺','Iceland 🇮🇸','India 🇮🇳','Indonesia 🇮🇩','Iran 🇮🇷',
  'Iraq 🇮🇶','Ireland 🇮🇪','Israel 🇮🇱','Italy 🇮🇹','Jamaica 🇯🇲',
  'Japan 🇯🇵','Jordan 🇯🇴','Kazakhstan 🇰🇿','Kenya 🇰🇪','Kuwait 🇰🇼',
  'Kyrgyzstan 🇰🇬','Laos 🇱🇦','Latvia 🇱🇻','Lebanon 🇱🇧','Libya 🇱🇾',
  'Lithuania 🇱🇹','Luxembourg 🇱🇺','Macau 🇲🇴','Malaysia 🇲🇾','Maldives 🇲🇻',
  'Malta 🇲🇹','Mexico 🇲🇽','Moldova 🇲🇩','Mongolia 🇲🇳','Morocco 🇲🇦',
  'Myanmar 🇲🇲','Nepal 🇳🇵','Netherlands 🇳🇱','New Zealand 🇳🇿','Nigeria 🇳🇬',
  'Norway 🇳🇴','Oman 🇴🇲','Pakistan 🇵🇰','Palestine 🇵🇸','Panama 🇵🇦',
  'Paraguay 🇵🇾','Peru 🇵🇪','Philippines 🇵🇭','Poland 🇵🇱','Portugal 🇵🇹',
  'Qatar 🇶🇦','Romania 🇷🇴','Russia 🇷🇺','Saudi Arabia 🇸🇦','Serbia 🇷🇸',
  'Singapore 🇸🇬','Slovakia 🇸🇰','Slovenia 🇸🇮','South Africa 🇿🇦','South Korea 🇰🇷',
  'Spain 🇪🇸','Sri Lanka 🇱🇰','Sweden 🇸🇪','Switzerland 🇨🇭','Syria 🇸🇾',
  'Taiwan 🇹🇼','Tajikistan 🇹🇯','Tanzania 🇹🇿','Thailand 🇹🇭','Tunisia 🇹🇳',
  'Turkey 🇹🇷','Turkmenistan 🇹🇲','Uganda 🇺🇬','Ukraine 🇺🇦','UAE 🇦🇪',
  'United Kingdom 🇬🇧','United States 🇺🇸','Uruguay 🇺🇾','Uzbekistan 🇺🇿',
  'Venezuela 🇻🇪','Vietnam 🇻🇳','Yemen 🇾🇪','Zimbabwe 🇿🇼','Other 🌍'
];

const STAR_LABELS = ['','Poor','Fair','Good','Great','Excellent'];

let fields = [], answers = {}, step = 0;

async function init() {
  try {
    const res = await fetch('/api/deposit?action=review-get-form');
    const data = await res.json();
    fields = (data.fields || []).filter(f => f.label);
    if (!fields.length) {
      document.getElementById('app').innerHTML = '<div class="center-msg question-wrap"><div class="question-text" style="font-size:1.2rem">This form is not set up yet.<br>Please try again later.</div></div>';
      return;
    }
    renderStep();
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="center-msg">An error occurred. Please try again later.</div>';
  }
}

function setProgress(n, total) {
  document.getElementById('progress').style.width = (total ? n / total * 100 : 0) + '%';
}

function buildNatSearch(currentVal, onChange) {
  let selected = currentVal || '';
  const wrap = document.createElement('div');
  wrap.className = 'nat-wrap';

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'q-input';
  inp.placeholder = 'Type to search nationality…';
  inp.autocomplete = 'off';
  inp.spellcheck = false;
  inp.value = selected;

  const dd = document.createElement('div');
  dd.className = 'nat-dd';
  dd.style.display = 'none';

  function renderList(q) {
    const lower = q.toLowerCase();
    const matches = q.trim() ? NATIONALITIES.filter(n => n.toLowerCase().includes(lower)) : NATIONALITIES;
    if (!matches.length) {
      dd.innerHTML = '<div class="nat-empty">No results found</div>';
    } else {
      dd.innerHTML = matches.map(n =>
        `<div class="nat-opt${n === selected ? ' sel' : ''}">${n}</div>`
      ).join('');
      dd.querySelectorAll('.nat-opt').forEach((opt, i) => {
        opt.addEventListener('mousedown', e => {
          e.preventDefault();
          selected = matches[i];
          inp.value = selected;
          onChange(selected);
          dd.style.display = 'none';
        });
      });
    }
    dd.style.display = 'block';
  }

  inp.addEventListener('focus', () => renderList(inp.value));
  inp.addEventListener('input', () => { selected = ''; onChange(''); renderList(inp.value); });
  inp.addEventListener('blur', () => setTimeout(() => { dd.style.display = 'none'; }, 160));
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); nextStep(); } });

  wrap.appendChild(inp);
  wrap.appendChild(dd);
  return wrap;
}

function renderStep() {
  if (step >= fields.length) { showSubmit(); return; }
  const f = fields[step];
  setProgress(step, fields.length);
  const isLast = step === fields.length - 1;
  const app = document.getElementById('app');
  app.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'question-wrap';
  const optionalTag = f.required ? '' : ' <span style="font-size:.9rem;opacity:.6;font-weight:400">(optional)</span>';
  wrap.innerHTML = `
    <div class="step-label">${step + 1} / ${fields.length}</div>
    <div class="question-text">${esc(f.label)}${optionalTag}</div>
    ${f.placeholder ? `<div class="question-hint">${esc(f.placeholder)}</div>` : ''}
    <div id="input-area"></div>
    <div id="btn-area"></div>`;
  app.appendChild(wrap);
  renderInput(f, isLast);
}

function renderInput(f, isLast) {
  const ia = document.getElementById('input-area');
  const ba = document.getElementById('btn-area');
  const cur = answers[f.id];
  const nextLabel = isLast ? 'Submit ✓' : 'Next →';
  const skipBtn = f.required ? '' : `<button class="skip-link" onclick="skipStep()">Skip this question</button>`;

  if (f.type === 'star') {
    let sel = cur || 0;
    const row = document.createElement('div'); row.className = 'star-row';
    const lbl = document.createElement('div'); lbl.className = 'star-label';
    lbl.textContent = sel ? STAR_LABELS[sel] : 'Tap a star to rate';
    for (let i = 1; i <= 5; i++) {
      const s = document.createElement('span');
      s.textContent = '★'; s.className = 'star' + (i <= sel ? ' active' : '');
      s.addEventListener('mouseenter', () => { row.querySelectorAll('.star').forEach((x,j)=>x.classList.toggle('active',j<i)); lbl.textContent=STAR_LABELS[i]; });
      s.addEventListener('mouseleave', () => { row.querySelectorAll('.star').forEach((x,j)=>x.classList.toggle('active',j<sel)); lbl.textContent=sel?STAR_LABELS[sel]:'Tap a star to rate'; });
      s.addEventListener('click', () => { sel=i; answers[f.id]=i; row.querySelectorAll('.star').forEach((x,j)=>x.classList.toggle('active',j<i)); lbl.textContent=STAR_LABELS[i]; });
      row.appendChild(s);
    }
    ia.appendChild(row); ia.appendChild(lbl);
    ba.innerHTML = `<button class="next-btn" onclick="nextStep()">${nextLabel}</button>${skipBtn}`;

  } else if (f.type === 'yesno') {
    ia.innerHTML = `<div class="yesno-row">
      <button class="yn-btn${cur==='yes'?' selected':''}" onclick="selectYN('yes',this)">Yes ✅</button>
      <button class="yn-btn${cur==='no'?' selected':''}" onclick="selectYN('no',this)">No ❌</button>
    </div>`;
    ba.innerHTML = `<button class="next-btn" onclick="nextStep()">${nextLabel}</button>${skipBtn}`;

  } else if (f.type === 'nationality') {
    const widget = buildNatSearch(cur || '', val => { answers[f.id] = val; });
    ia.appendChild(widget);
    ba.innerHTML = `<button class="next-btn" onclick="nextStep()">${nextLabel}</button>${skipBtn}`;
    setTimeout(() => widget.querySelector('input').focus(), 50);

  } else if (f.type === 'dropdown') {
    const opts = f.options || [];
    ia.innerHTML = `<select class="q-select" onchange="answers['${f.id}']=this.value">
      <option value="">-- Please select --</option>
      ${opts.map(o=>`<option value="${esc(o)}"${cur===o?' selected':''}>${esc(o)}</option>`).join('')}
    </select>`;
    ba.innerHTML = `<button class="next-btn" onclick="nextStep()">${nextLabel}</button>${skipBtn}`;

  } else if (f.type === 'textarea') {
    ia.innerHTML = `<textarea class="q-input q-textarea" id="q-inp" placeholder="${esc(f.placeholder||'')}">${esc(cur||'')}</textarea>`;
    document.getElementById('q-inp').addEventListener('input', e => { answers[f.id] = e.target.value; });
    ba.innerHTML = `<button class="next-btn" onclick="nextStep()">${nextLabel}</button>${skipBtn}`;

  } else {
    const inputType = f.type === 'number' ? 'number' : 'text';
    ia.innerHTML = `<input type="${inputType}" class="q-input" id="q-inp" placeholder="${esc(f.placeholder||'')}" value="${esc(cur||'')}">`;
    const inp = document.getElementById('q-inp');
    inp.addEventListener('input', e => { answers[f.id] = e.target.value; });
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); nextStep(); } });
    ba.innerHTML = `<button class="next-btn" onclick="nextStep()">${nextLabel}</button>${skipBtn}<div class="hint">Press Enter to continue</div>`;
    setTimeout(() => inp.focus(), 50);
  }
}

function selectYN(val, el) {
  answers[fields[step].id] = val;
  el.parentElement.querySelectorAll('.yn-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function nextStep() {
  const f = fields[step];
  const val = answers[f.id];
  const isEmpty = val === undefined || val === null || val === '' || val === 0;
  if (f.required && isEmpty) {
    const wrap = document.querySelector('.question-wrap');
    wrap.classList.remove('error-shake'); void wrap.offsetWidth; wrap.classList.add('error-shake');
    return;
  }
  step++; renderStep();
}

function skipStep() { step++; renderStep(); }

function showSubmit() {
  setProgress(fields.length, fields.length);
  document.getElementById('app').innerHTML = `
    <div class="question-wrap">
      <div class="step-label">Almost done</div>
      <div class="question-text">Ready to submit your review?</div>
      <div class="question-hint">Thank you for taking the time to share your experience with us.</div>
      <button class="next-btn" id="submit-btn" onclick="submitReview()">Submit ✓</button>
    </div>`;
}

async function submitReview() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  const answersArr = fields
    .map(f => ({ id: f.id, label: f.label, type: f.type, value: answers[f.id] ?? '' }))
    .filter(a => a.value !== '' && a.value !== undefined && a.value !== null && a.value !== 0);
  try {
    const res = await fetch('/api/deposit?action=review-submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers: answersArr })
    });
    if (!res.ok) throw new Error();
    document.getElementById('app').innerHTML = `
      <div class="thanks">
        <div class="thanks-icon">⭐</div>
        <h2>Thank you!</h2>
        <p>Your review has been submitted successfully.<br>We truly appreciate your feedback — it helps us<br>improve our service for every guest.</p>
      </div>`;
    document.getElementById('progress').style.width = '100%';
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Try again';
    alert('Something went wrong. Please try again.');
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
